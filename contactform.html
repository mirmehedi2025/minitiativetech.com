
<style>
    /* Innovation: Floating Background Elements */
    .contact-section {
        position: relative;
        background: #0f172a;
        padding: 100px 20px;
        overflow: hidden;
    }

    .contact-section::before {
        content: '';
        position: absolute;
        top: 20%;
        left: 10%;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        z-index: 0;
    }

    .container {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
    }

    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 80px;
        align-items: center;
    }

    /* Innovation: Badge and Gradient Text */
    .badge {
        background: rgba(59, 130, 246, 0.1);
        color: #60a5fa;
        padding: 6px 16px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .gradient-text {
        background: linear-gradient(90deg, #00ff88, #00d4ff);;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .contact-info h2 {
        font-size: 48px;
        line-height: 1.2;
        margin: 20px 0;
        color: #ffffff;
    }

    .contact-details p {
        display: flex;
        align-items: center;
        gap: 15px;
        color: #94a3b8;
        margin-bottom: 20px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.3s;
    }

    .contact-details p:hover {
        background: rgba(255, 255, 255, 0.07);
        transform: translateX(10px);
    }

    .contact-details i {
        color: #3b82f6;
    }

    /* Innovation: Glassmorphism Form */
    .contact-form {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .form-group {
        position: relative;
        margin-bottom: 20px;
    }

    .contact-form input,
    .contact-form textarea {
        width: 100%;
        padding: 14px 0;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    /* Innovation: Animated Underline focus */
    .contact-form input:focus,
    .contact-form textarea:focus {
        border-bottom-color: #3b82f6;
    }

    .btn-submit {
        background: linear-gradient(90deg, #00ff88, #00d4ff);;
        color: white;
        padding: 16px 32px;
        border: none;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
        width: 100%;
    }

    .btn-submit:hover {
        background: #2563eb;
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    /* Mobile Responsive */
    @media (max-width: 900px) {
        .contact-grid { grid-template-columns: 1fr; gap: 40px; }
        .contact-info h2 { font-size: 36px; }
    }
</style>



<section class="contact-section">
    <div class="container contact-grid">

        <div class="contact-info">
            <span class="badge">Contact Us</span>
            <h2>Let’s Build Something <span class="gradient-text">Exceptional</span></h2>
            <p>
                Ready to transform your digital footprint? Our team in Bogura is ready 
                to turn your complex challenges into seamless digital experiences.
            </p>

            <div class="contact-details">
                <p><i data-lucide="map-pin"></i> Bogura, Bangladesh</p>
                <p><i data-lucide="phone"></i> +8801842741932</p>
                <p><i data-lucide="mail"></i> minitiativetech@gmail.com</p>
            </div>
        </div>

        <form class="contact-form" id="agencyForm">
            <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Your Email" required>
                </div>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Project Type (e.g. SEO, Web Design)">
            </div>

            <div class="form-group">
                <textarea rows="4" placeholder="Tell us about your project..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <span>Send Message</span>
                <i data-lucide="send" size="18"></i>
            </button>
        </form>

    </div>
</section>
