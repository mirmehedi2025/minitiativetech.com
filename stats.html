<style>
    /* Section Container */
    .stats {
        background: #0f172a; /* Deep Navy */
        padding: 60px 20px;
        color: white;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Responsive Grid */
    .stats-grid {
        display: grid;
        /* Mobile: 1 column | Tablet: 2 columns | Desktop: 4 columns */
        grid-template-columns: repeat(1, 1fr); 
        gap: 20px;
    }

    @media (min-width: 640px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
        .stats-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* Individual Card Style */
    .stat-item {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 40px 20px;
        text-align: center;
        transition: all 0.3s ease;
    }

    .stat-item:hover {
        transform: translateY(-8px);
        border-color: #3b82f6;
        background: rgba(59, 130, 246, 0.05);
        box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
    }

    /* Number Typography */
    .stat-number {
        font-size: 3rem;
        font-weight: 800;
        margin-bottom: 8px;
        background: linear-gradient(135deg, #ffffff 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
    }

    /* Label Typography */
    .stat-label {
        font-size: 0.875rem;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 600;
    }
    /* This allows CSS to animate a raw number */
@property --num {
  syntax: "<integer>";
  initial-value: 0;
  inherits: false;
}

.stat-number {
  animation: counter 2s ease-out forwards;
  counter-reset: num var(--num);
}

.stat-number::after {
  content: counter(num);
}

/* Specific Targets for each card */
.count-99 { --target: 99; }
.count-99::after { content: counter(num) "%"; }

.count-150 { --target: 150; }
.count-150::after { content: counter(num) "+"; }

.count-24 { --target: 24; }
.count-24::after { content: counter(num) "/7"; }

.count-10 { --target: 10; }
.count-10::after { content: counter(num) "x"; }

@keyframes counter {
  from { --num: 0; }
  to { --num: var(--target); }
}

/* Fallback for older browsers: show the number immediately */
@supports not (background: paint(something)) {
  .count-99::after { content: "99%"; }
  .count-150::after { content: "150+"; }
  .count-24::after { content: "24/7"; }
  .count-10::after { content: "10x"; }
}
</style>
<section class="stats">
    <div class="container stats-grid">
        <div class="stat-item">
            <div class="stat-number count-99"></div>
            <div class="stat-label">Client Satisfaction</div>
        </div>
        <div class="stat-item">
            <div class="stat-number count-150"></div>
            <div class="stat-label">Projects Delivered</div>
        </div>
        <div class="stat-item">
            <div class="stat-number count-24"></div>
            <div class="stat-label">Support</div>
        </div>
        <div class="stat-item">
            <div class="stat-number count-10"></div>
            <div class="stat-label">ROI for Clients</div>
        </div>
    </div>
</section>
