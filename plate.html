<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitiativetech Template Builder</title>
    <link rel="stylesheet" href="template.css">
</head>
<body>

    <aside id="sidebar">
        <header>
            <h2>Template Builder</h2>
            <p>Customize your email below</p>
        </header>

        <div class="control-group">
            <h3>Header & Branding</h3>
            <label>Brand Name</label>
            <input type="text" id="brandName" value="Minitiativetech">
            
            <label>Tagline</label>
            <input type="text" id="tagline" value="Zero Does Matter">
            
            <div class="color-picker-row">
                <div>
                    <label>Brand</label>
                    <input type="color" id="brandColor" value="#1365fd">
                </div>
                <div>
                    <label>Tagline</label>
                    <input type="color" id="taglineColor" value="#4beb0b">
                </div>
            </div>
        </div>

        <div class="control-group">
            <h3>Email Body</h3>
            <label>Greeting</label>
            <input type="text" id="greeting" value="Hello there,">
            
            <label>Main Message</label>
            <textarea id="bodyText" rows="4">Welcome to Minitiativetech. We believe efficiency starts from the ground up...</textarea>
            
            <label>Background Color</label>
            <input type="color" id="bodyBg" value="#0f172a" class="wide-color">
        </div>

        <div class="control-group">
            <h3>Call to Action</h3>
            <label>Button Text</label>
            <input type="text" id="btnText" value="Visit Our Website">
            
            <label>Button Link</label>
            <input type="text" id="btnUrl" value="https://minitiativetech.com">
            
            <label>Button Color</label>
            <input type="color" id="btnBg" value="#27ADF5" class="wide-color">
        </div>

        <div class="control-group">
            <h3>Contact & Footer</h3>
            <label>Footer Logo URL</label>
            <input type="text" id="logoUrl" placeholder="https://example.com/logo.png">

            <label>Business Address</label>
            <input type="text" id="address" placeholder="123 Tech Lane, NY">
            
            <label>Business Email</label>
            <input type="text" id="businessEmail" placeholder="contact@minitiative.com">
            
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="+1 234 567 890">
        </div>

        <div class="control-group">
            <h3>Social Media Links</h3>
            <label>Facebook</label>
            <input type="text" id="facebookUrl" placeholder="URL">
            <label>Instagram</label>
            <input type="text" id="instagramUrl" placeholder="URL">
            <label>LinkedIn</label>
            <input type="text" id="linkedinUrl" placeholder="URL">
            <label>YouTube</label>
            <input type="text" id="youtubeUrl" placeholder="URL">
        </div>

        <div class="sidebar-footer">
            <button id="copyBtn" class="primary-btn">Copy HTML Code</button>
        </div>
    </aside>

    <main id="preview-area">
        <div class="canvas-wrapper">
            <iframe id="email-preview"></iframe>
        </div>
    </main>

    <script src="plate.js"></script>
</body>
</html>
